version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npx expo export --platform web
        - cp -r .well-known dist/
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '/.well-known/apple-app-site-association'
      headers:
        - key: 'Content-Type'
          value: 'application/json'
    - pattern: '/.well-known/assetlinks.json'
      headers:
        - key: 'Content-Type'
          value: 'application/json'